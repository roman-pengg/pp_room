<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pproom — 量化策略报告</title>
<style>
body { font-family: -apple-system, sans-serif; margin: 20px; background: #f5f7fa; color: #333; }
.container { max-width: 800px; margin: 0 auto; }
h1 { color: #1a3a5c; border-bottom: 3px solid #4472C4; padding-bottom: 10px; }
h2 { color: #2a5a8c; margin-top: 30px; font-size: 18px; }
a { color: #4472C4; text-decoration: none; display: block; padding: 6px 10px; border-radius: 4px; word-break: break-all; }
a:hover { background: #e8f0fe; }
.file-list { background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.file-item { border-bottom: 1px solid #e8e8e8; font-size: 14px; padding: 2px 0; }
.file-item:last-child { border-bottom: none; }
.more-btn { display: block; width: 100%; padding: 8px; margin-top: 8px; background: #f0f4fa; border: 1px solid #d0d8e8; border-radius: 6px; color: #4472C4; font-size: 14px; cursor: pointer; text-align: center; }
.more-btn:hover { background: #e0e8f4; }
.chart-grid { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
.chart-grid a { display: block; width: 15%; padding: 0; }
.chart-grid img { width: 100%; border-radius: 4px; border: 1px solid #ddd; }
</style>
</head>
<body>
<div class="container">
<h1>📊 pproom — 量化策略报告</h1>
<p style="color:#666">由 sync_to_pproom.sh 自动同步</p>

<h2>📋 策略评估报告</h2>
<div class="file-list" id="assess-list">加载中...</div>

<h2>📈 实盘交易收益分析</h2>
<div class="file-list" id="live-list">加载中...</div>

<h2>📉 交易图表快照</h2>
<div class="file-list" id="chart-list">加载中...</div>

<p style="color:#999;text-align:center;margin-top:40px">--- pproom 展示仓库 ---</p>
</div>

<script>
fetch('filelist.json').then(r => r.json()).then(data => {
  // 评估报告（每页10条）
  (function() {
    const list = document.getElementById('assess-list');
    const items = data.assess || [];
    let page = 0, PAGE_SIZE = 10;
    const container = document.createElement('div');
    function show() {
      const end = Math.min((page + 1) * PAGE_SIZE, items.length);
      for (let i = page * PAGE_SIZE; i < end; i++) {
        const d = document.createElement('div'); d.className = 'file-item';
        d.innerHTML = '<a href="outputs/assess/' + encodeURIComponent(items[i]) + '">📄 ' + items[i] + '</a>';
        container.appendChild(d);
      }
      page++;
      if (end < items.length) {
        const btn = document.createElement('button'); btn.className = 'more-btn';
        btn.textContent = '显示更多（' + end + '/' + items.length + '）';
        btn.onclick = function(){ btn.remove(); show(); };
        container.appendChild(btn);
      }
    }
    show();
    list.innerHTML = ''; list.appendChild(container);
  })();

  // 实盘报表（每页10条）
  (function() {
    const list = document.getElementById('live-list');
    const items = data.live_report || [];
    let page = 0, PAGE_SIZE = 10;
    const container = document.createElement('div');
    function show() {
      const end = Math.min((page + 1) * PAGE_SIZE, items.length);
      for (let i = page * PAGE_SIZE; i < end; i++) {
        const d = document.createElement('div'); d.className = 'file-item';
        d.innerHTML = '<a href="LIVE/live_report/' + encodeURIComponent(items[i]) + '">📊 ' + items[i] + '</a>';
        container.appendChild(d);
      }
      page++;
      if (end < items.length) {
        const btn = document.createElement('button'); btn.className = 'more-btn';
        btn.textContent = '显示更多（' + end + '/' + items.length + '）';
        btn.onclick = function(){ btn.remove(); show(); };
        container.appendChild(btn);
      }
    }
    show();
    list.innerHTML = ''; list.appendChild(container);
  })();

  // 交易图表快照（每批2个回测，每批内缩略图分页18张）
  (function() {
    const list = document.getElementById('chart-list');
    const batches = data.trading_charts || [];
    if (batches.length === 0) { list.innerHTML = '<p style="color:#999">暂无快照</p>'; return; }
    let batchPage = 0, BATCH_SIZE = 2, THUMB_PER_PAGE = 18;
    const container = document.createElement('div');

    function showBatch() {
      const end = Math.min((batchPage + 1) * BATCH_SIZE, batches.length);
      for (let i = batchPage * BATCH_SIZE; i < end; i++) {
        const b = batches[i];
        const batchDiv = document.createElement('div');
        batchDiv.style.cssText = 'margin:12px 0';
        let thumbPage = 0;
        let inner = document.createElement('div');

        function showThumbs() {
          const tEnd = Math.min((thumbPage + 1) * THUMB_PER_PAGE, b.files.length);
          let html = '<strong>📁 ' + b.dir + '</strong> (' + b.count + ' 张)<div class="chart-grid">';
          for (let j = thumbPage * THUMB_PER_PAGE; j < tEnd; j++) {
            html += '<a href="outputs/trading_charts/' + b.dir + '/' + encodeURIComponent(b.files[j]) + '" target="_blank"><img src="outputs/trading_charts/' + b.dir + '/' + encodeURIComponent(b.files[j]) + '"></a>';
          }
          html += '</div>';
          inner.innerHTML = html;
          thumbPage++;
          // 移除旧的"显示更多"按钮
          var oldBtn = batchDiv.querySelector('.more-btn');
          if (oldBtn) oldBtn.remove();
          if (tEnd < b.files.length) {
            const btn = document.createElement('button'); btn.className = 'more-btn';
            btn.textContent = '显示更多（' + tEnd + '/' + b.files.length + '）';
            btn.onclick = function(){ btn.remove(); showThumbs(); };
            batchDiv.appendChild(btn);
          }
        }
        showThumbs();
        batchDiv.insertBefore(inner, batchDiv.firstChild);
        container.appendChild(batchDiv);
      }
      batchPage++;
      if (end < batches.length) {
        const btn = document.createElement('button'); btn.className = 'more-btn';
        btn.textContent = '显示更多批次（' + end + '/' + batches.length + '）';
        btn.onclick = function(){ btn.remove(); showBatch(); };
        container.appendChild(btn);
      }
    }
    showBatch();
    list.innerHTML = ''; list.appendChild(container);
  })();
}).catch(function(e) {
  document.getElementById('assess-list').innerHTML = '<p style="color:#999">数据加载失败</p>';
  document.getElementById('live-list').innerHTML = '';
  document.getElementById('chart-list').innerHTML = '';
});
</script>
</body>
</html>
