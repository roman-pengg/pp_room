<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pproom — 量化策略报告</title>
<style>
body { font-family: -apple-system, sans-serif; margin: 20px; background: #f5f7fa; color: #333; }
.container { max-width: 800px; margin: 0 auto; }
h1 { color: #1a3a5c; border-bottom: 3px solid #4472C4; padding-bottom: 10px; }
h2 { color: #2a5a8c; margin-top: 30px; font-size: 18px; }
a { color: #4472C4; text-decoration: none; display: block; padding: 6px 10px; border-radius: 4px; }
a:hover { background: #e8f0fe; }
.file-list { background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.file-item { border-bottom: 1px solid #e8e8e8; font-size: 14px; }
.file-item:last-child { border-bottom: none; }
.time { color: #999; font-size: 12px; margin-left: 10px; }
</style>
</head>
<body>
<div class="container">
<h1>📊 pproom — 量化策略报告</h1>
<p style="color:#666">由 sync_to_pproom.sh 自动同步</p>

<h2>📋 策略评估报告</h2>
<div class="file-list" id="assess-list">加载中...</div>

<h2>📈 实盘交易收益分析</h2>
<div class="file-list" id="live-list">加载中...</div>

<h2>📉 交易图表快照</h2>
<div class="file-list" id="chart-list">加载中...</div>

<p style="color:#999;text-align:center;margin-top:40px">--- pproom 展示仓库 ---</p>
</div>

<script>
fetch('https://api.github.com/repos/roman-pengg/pp_room/contents/outputs/assess')
  .then(r => r.json())
  .then(files => {
    const list = document.getElementById('assess-list');
    list.innerHTML = files
      .filter(f => f.name.endsWith('.html'))
      .sort((a, b) => b.name.localeCompare(a.name))
      .map(f => `<div class="file-item"><a href="${f.name}">📄 ${decodeURIComponent(f.name)}</a></div>`)
      .join('');
  }).catch(() => document.getElementById('assess-list').innerHTML = '暂无文件');

fetch('https://api.github.com/repos/roman-pengg/pp_room/contents/LIVE/live_report')
  .then(r => r.json())
  .then(files => {
    const list = document.getElementById('live-list');
    list.innerHTML = files
      .filter(f => f.name.endsWith('.xlsx'))
      .sort((a, b) => b.name.localeCompare(a.name))
      .map(f => `<div class="file-item"><a href="${f.name}">📊 ${decodeURIComponent(f.name)}</a></div>`)
      .join('');
  }).catch(() => document.getElementById('live-list').innerHTML = '暂无文件');

fetch('https://api.github.com/repos/roman-pengg/pp_room/contents/outputs/trading_charts')
  .then(r => r.json())
  .then(dirs => {
    const list = document.getElementById('chart-list');
    const recent = (dirs || []).filter(d => d.type === 'dir').sort((a, b) => b.name.localeCompare(a.name)).slice(0, 5);
    if (recent.length === 0) { list.innerHTML = '暂无快照'; return; }
    Promise.allSettled(recent.map(d =>
      fetch(d.url).then(r => r.json()).then(files => ({ dir: d.name, files: files || [] }))
    )).then(results => {
      let html = '';
      results.forEach(r => {
        if (r.status !== 'fulfilled') return;
        html += `<div style="margin:10px 0"><strong>📁 ${r.value.dir}</strong></div>`;
        r.value.files.filter(f => f.name.endsWith('.png')).slice(0, 6).forEach(f => {
          html += `<img src="${f.download_url}" style="width:30%;margin:2px;border-radius:4px;border:1px solid #ddd">`;
        });
        html += `<div style="font-size:12px;color:#999;margin:4px 0">共 ${r.value.files.filter(f=>f.name.endsWith('.png')).length} 张</div>`;
      });
      list.innerHTML = html;
    });
  }).catch(() => document.getElementById('chart-list').innerHTML = '暂无快照');
</script>
</body>
</html>
