<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pproom — 量化策略报告</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; margin: 20px; background: #f5f7fa; color: #333; }
.container { max-width: 800px; margin: 0 auto; }
h1 { color: #1a3a5c; border-bottom: 3px solid #4472C4; padding-bottom: 10px; }
h2 { color: #2a5a8c; margin-top: 30px; font-size: 18px; }
a { color: #4472C4; text-decoration: none; display: block; padding: 6px 10px; border-radius: 4px; word-break: break-all; }
a:hover { background: #e8f0fe; }
.file-list { background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.file-item { border-bottom: 1px solid #e8e8e8; font-size: 14px; padding: 2px 0; }
.file-item:last-child { border-bottom: none; }
.page-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.page-btn { padding: 6px 14px; background: #f0f4fa; border: 1px solid #d0d8e8; border-radius: 6px; color: #4472C4; font-size: 13px; cursor: pointer; }
.page-btn:hover { background: #e0e8f4; }
.page-btn:disabled { opacity: 0.4; cursor: default; }
.page-info { font-size: 13px; color: #888; }
.chart-grid { display: flex; flex-wrap: wrap; gap: 3px; margin: 6px 0; }
.chart-grid a { display: block; width: 16.66%; padding: 0; border-radius: 3px; overflow: hidden; }
.chart-grid img { width: 100%; display: block; border: 1px solid #ddd; border-radius: 3px; }
@media (max-width: 600px) { .chart-grid a { width: 33.33%; } }
/* Lightbox */
#lightbox { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); }
#lightbox.show { display: flex; align-items: center; justify-content: center; }
#lightbox img { max-width: 92%; max-height: 88%; object-fit: contain; border-radius: 4px; }
.lb-close { position: absolute; top: 8px; right: 16px; font-size: 32px; color: #fff; cursor: pointer; z-index: 2; }
.lb-nav { position: absolute; top: 0; width: 50%; height: 100%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 36px; user-select: none; opacity: 0; transition: opacity 0.2s; }
#lightbox:hover .lb-nav, #lightbox.show .lb-nav { opacity: 1; }
.lb-prev { left: 0; }
.lb-next { right: 0; }
.lb-counter { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); color: #ccc; font-size: 13px; background: rgba(0,0,0,0.5); padding: 3px 10px; border-radius: 10px; z-index: 2; }
</style>
</head>
<body>
<div class="container">
<h1>📊 pproom — 量化策略报告</h1>
<p style="color:#666">由 sync_to_pproom.sh 自动同步</p>

<h2>📋 策略评估报告</h2>
<div class="file-list" id="assess-list">加载中...</div>

<h2>📉 交易图表快照</h2>
<div class="file-list" id="chart-list">加载中...</div>

<h2>📈 实盘交易收益分析</h2>
<div class="file-list" id="live-list"><p style="color:#999">手动上传至 pproom 仓库 LIVE/live_report/ 目录</p></div>

<p style="color:#999;text-align:center;margin-top:40px">--- pproom 展示仓库 ---</p>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox(event)">
  <span class="lb-close" onclick="closeLightbox()">&times;</span>
  <span class="lb-nav lb-prev" id="lbPrev" onclick="navLightbox(-1)">&#10094;</span>
  <img id="lbImg">
  <span class="lb-nav lb-next" id="lbNext" onclick="navLightbox(1)">&#10095;</span>
  <span class="lb-counter" id="lbCounter"></span>
</div>

<script>
// Lightbox 状态
var lbImages = [], lbIndex = 0;
function openLightbox(images, idx) {
  lbImages = images; lbIndex = idx;
  document.getElementById('lbImg').src = images[idx];
  document.getElementById('lbCounter').textContent = (idx+1) + ' / ' + images.length;
  document.getElementById('lightbox').classList.add('show');
  document.getElementById('lbPrev').style.display = idx > 0 ? 'block' : 'none';
  document.getElementById('lbNext').style.display = idx < images.length-1 ? 'block' : 'none';
}
function closeLightbox(e) { if (!e || e.target === e.currentTarget) document.getElementById('lightbox').classList.remove('show'); }
function navLightbox(dir) {
  var i = lbIndex + dir;
  if (i < 0 || i >= lbImages.length) return;
  openLightbox(lbImages, i);
}

// 分页工具
function paginate(container, items, pageSize, renderItem) {
  var page = 0, totalPages = Math.ceil(items.length / pageSize);

  function renderPage() {
    container.innerHTML = '';
    var start = page * pageSize;
    var end = Math.min(start + pageSize, items.length);
    for (var i = start; i < end; i++) container.appendChild(renderItem(items[i], i));

    var bar = document.createElement('div'); bar.className = 'page-bar';
    var prevBtn = document.createElement('button'); prevBtn.className = 'page-btn'; prevBtn.textContent = '‹ 上一页'; prevBtn.disabled = page === 0;
    prevBtn.onclick = function(){ page--; renderPage(); };
    var info = document.createElement('span'); info.className = 'page-info'; info.textContent = (page+1) + '/' + totalPages + ' 共' + items.length;
    var nextBtn = document.createElement('button'); nextBtn.className = 'page-btn'; nextBtn.textContent = '下一页 ›'; nextBtn.disabled = page >= totalPages-1;
    nextBtn.onclick = function(){ page++; renderPage(); };
    bar.appendChild(prevBtn); bar.appendChild(info); bar.appendChild(nextBtn);
    container.appendChild(bar);
  }
  renderPage();
}

// 加载数据
fetch('filelist.json').then(function(r){ return r.json(); }).then(function(data) {

  // 评估报告分页
  (function(){
    var list = document.getElementById('assess-list');
    var container = document.createElement('div');
    paginate(container, data.assess || [], 10, function(name){
      var d = document.createElement('div'); d.className = 'file-item';
      d.innerHTML = '<a href="outputs/assess/' + encodeURIComponent(name) + '">📄 ' + name + '</a>';
      return d;
    });
    list.innerHTML = ''; list.appendChild(container);
  })();

  // 交易图表快照
  (function(){
    var list = document.getElementById('chart-list');
    var batches = data.trading_charts || [];
    if (batches.length === 0) { list.innerHTML = '<p style="color:#999">暂无快照</p>'; return; }

    var batchContainer = document.createElement('div');
    paginate(batchContainer, batches, 2, function(b){
      var div = document.createElement('div'); div.style.cssText = 'margin:12px 0';
      var header = document.createElement('div'); header.innerHTML = '<strong>📁 ' + b.dir + '</strong> (' + b.count + ' 张)';
      div.appendChild(header);

      var thumbGrid = document.createElement('div'); thumbGrid.className = 'chart-grid';
      var imgUrls = (b.files || []).map(function(f){ return 'outputs/trading_charts/' + b.dir + '/' + encodeURIComponent(f); });

      // 缩略图分页
      var thumbContainer = document.createElement('div');
      paginate(thumbContainer, imgUrls, 18, function(url, idx){
        var a = document.createElement('a'); a.href = 'javascript:void(0)';
        a.onclick = function(){ openLightbox(imgUrls, idx); };
        var img = document.createElement('img'); img.src = url; img.loading = 'lazy';
        a.appendChild(img); return a;
      });
      div.appendChild(thumbContainer);
      return div;
    });
    list.innerHTML = ''; list.appendChild(batchContainer);
  })();
}).catch(function(){ document.getElementById('assess-list').innerHTML = '<p style="color:#999">数据加载失败</p>'; });
</script>
</body>
</html>
