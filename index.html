<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pproom — 量化策略报告</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; margin: 20px; background: #f5f7fa; color: #333; }
.container { max-width: 800px; margin: 0 auto; }
h1 { color: #1a3a5c; border-bottom: 3px solid #4472C4; padding-bottom: 10px; }
h2 { color: #2a5a8c; margin-top: 30px; font-size: 18px; }
a { color: #4472C4; text-decoration: none; display: block; padding: 6px 10px; border-radius: 4px; word-break: break-all; }
a:hover { background: #e8f0fe; }
.file-list { background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.file-item { border-bottom: 1px solid #e8e8e8; font-size: 14px; padding: 2px 0; }
.file-item:last-child { border-bottom: none; }
.page-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.page-btn { padding: 6px 14px; background: #f0f4fa; border: 1px solid #d0d8e8; border-radius: 6px; color: #4472C4; font-size: 13px; cursor: pointer; }
.page-btn:hover { background: #e0e8f4; }
.page-btn:disabled { opacity: 0.4; cursor: default; }
.page-info { font-size: 13px; color: #888; }
.chart-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin: 6px 0; }
.chart-grid a { display: block; border-radius: 3px; overflow: hidden; }
.chart-grid img { width: 100%; display: block; border: 1px solid #ddd; border-radius: 3px; }
@media (max-width: 600px) { .chart-grid { grid-template-columns: repeat(2, 1fr); } }
/* Lightbox */
#lightbox { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); }
#lightbox.show { display: flex; align-items: center; justify-content: center; }
.lb-content { position: relative; display: flex; align-items: center; justify-content: center; max-width: 92%; max-height: 88%; }
#lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
.lb-close { position: absolute; z-index: 2; top: 8px; right: 16px; font-size: 32px; color: #fff; cursor: pointer; }
.lb-nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 2; width: 40px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; background: rgba(255,255,255,0.12); border-radius: 6px; cursor: pointer; user-select: none; }
.lb-nav:hover { background: rgba(255,255,255,0.25); }
.lb-prev { left: -52px; }
.lb-next { right: -52px; }
@media (max-width: 600px) { .lb-prev { left: -44px; } .lb-next { right: -44px; } .lb-nav { width: 34px; height: 60px; font-size: 22px; } }
.lb-counter { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); color: #ccc; font-size: 13px; background: rgba(0,0,0,0.5); padding: 3px 10px; border-radius: 10px; z-index: 2; }
</style>
</head>
<body>
<div class="container">
<h1>📊 pproom — 量化策略报告</h1>
<p style="color:#666">由 sync_to_pproom.sh 自动同步</p>

<h2>📋 策略评估报告</h2>
<div class="file-list" id="assess-list"></div>

<h2>📉 交易图表快照</h2>
<div class="file-list" id="chart-list"></div>

<h2>📈 实盘交易收益分析</h2>
<div class="file-list" id="live-list"></div>

<p style="color:#999;text-align:center;margin-top:40px">--- pproom 展示仓库 ---</p>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox(event)">
  <span class="lb-close" onclick="closeLightbox()">&times;</span>
  <div class="lb-content">
    <span class="lb-nav lb-prev" id="lbPrev" onclick="navLightbox(-1)">&#10094;</span>
    <img id="lbImg">
    <span class="lb-nav lb-next" id="lbNext" onclick="navLightbox(1)">&#10095;</span>
  </div>
  <span class="lb-counter" id="lbCounter"></span>
</div>

<script>
// Lightbox 状态
var lbImages = [], lbIndex = 0;
function openLightbox(images, idx) {
  lbImages = images; lbIndex = idx;
  document.getElementById('lbImg').src = images[idx];
  document.getElementById('lbCounter').textContent = (idx+1) + ' / ' + images.length;
  document.getElementById('lightbox').classList.add('show');
  document.getElementById('lbPrev').style.display = idx > 0 ? 'block' : 'none';
  document.getElementById('lbNext').style.display = idx < images.length-1 ? 'block' : 'none';
}
function closeLightbox(e) { if (!e || e.target === e.currentTarget) document.getElementById('lightbox').classList.remove('show'); }
function navLightbox(dir) {
  var i = lbIndex + dir;
  if (i < 0 || i >= lbImages.length) return;
  openLightbox(lbImages, i);
}

// 分页工具
function paginate(container, items, pageSize, renderItem) {
  var page = 0, totalPages = Math.ceil(items.length / pageSize);

  function renderPage() {
    container.innerHTML = '';
    var start = page * pageSize;
    var end = Math.min(start + pageSize, items.length);
    for (var i = start; i < end; i++) container.appendChild(renderItem(items[i], i));

    var bar = document.createElement('div'); bar.className = 'page-bar';
    var prevBtn = document.createElement('button'); prevBtn.className = 'page-btn'; prevBtn.textContent = '‹ 上一页'; prevBtn.disabled = page === 0;
    prevBtn.onclick = function(){ page--; renderPage(); };
    var info = document.createElement('span'); info.className = 'page-info'; info.textContent = (page+1) + '/' + totalPages + ' 共' + items.length;
    var nextBtn = document.createElement('button'); nextBtn.className = 'page-btn'; nextBtn.textContent = '下一页 ›'; nextBtn.disabled = page >= totalPages-1;
    nextBtn.onclick = function(){ page++; renderPage(); };
    bar.appendChild(prevBtn); bar.appendChild(info); bar.appendChild(nextBtn);
    container.appendChild(bar);
  }
  renderPage();
}

// 加载数据
fetch('/filelist.json').then(function(r){ return r.json(); }).then(function(data) {

  // 评估报告分页
  (function(){
    var list = document.getElementById('assess-list');
    var container = document.createElement('div');
    paginate(container, data.assess || [], 10, function(name){
      var d = document.createElement('div'); d.className = 'file-item';
      d.innerHTML = '<a href="/outputs/assess/' + encodeURIComponent(name) + '">📄 ' + name + '</a>';
      return d;
    });
    list.innerHTML = ''; list.appendChild(container);
  })();

  // 交易图表快照
  (function(){
    var list = document.getElementById('chart-list');
    var batches = data.trading_charts || [];
    if (batches.length === 0) { list.innerHTML = '<p style="color:#999">暂无快照</p>'; return; }

    var batchContainer = document.createElement('div');
    list.appendChild(batchContainer);
    var batchIndex = 0, batchPageSize = 2;

    function renderBatch(b) {
      var div = document.createElement('div'); div.style.cssText = 'margin:12px 0';
      var header = document.createElement('div'); header.innerHTML = '<strong>📁 ' + b.dir + '</strong> (' + b.count + ' 张)';
      div.appendChild(header);

      // 缩略图分页（每页 15 张，3行x5列）
      var thumbWrap = document.createElement('div');
      var chartGrid = document.createElement('div');
      chartGrid.className = 'chart-grid';
      thumbWrap.appendChild(chartGrid);

      var thumbUrls = (b.files || []).map(function(f){ return '/outputs/trading_charts/' + b.dir + '/' + encodeURIComponent(f); });
      var thumbPage = 0, thumbPageSize = 15, thumbTotalPages = Math.ceil(thumbUrls.length / thumbPageSize);

      function renderThumbPage() {
        chartGrid.innerHTML = '';
        var start = thumbPage * thumbPageSize;
        var end = Math.min(start + thumbPageSize, thumbUrls.length);
        for (var j = start; j < end; j++) {
          (function(idx){
            var a = document.createElement('a'); a.href = 'javascript:void(0)';
            a.onclick = function(){ openLightbox(thumbUrls, idx); };
            var img = document.createElement('img'); img.src = thumbUrls[idx]; img.loading = 'lazy';
            a.appendChild(img); chartGrid.appendChild(a);
          })(j);
        }

        // 分页条
        var oldBar = document.getElementById('tb-' + b.dir);
        if (oldBar) oldBar.remove();
        var bar = document.createElement('div'); bar.id = 'tb-' + b.dir; bar.className = 'page-bar';
        var prevBtn = document.createElement('button'); prevBtn.className = 'page-btn'; prevBtn.textContent = '‹ 上一页'; prevBtn.disabled = thumbPage === 0;
        prevBtn.onclick = function(){ thumbPage--; renderThumbPage(); };
        var info = document.createElement('span'); info.className = 'page-info'; info.textContent = (thumbPage+1) + '/' + thumbTotalPages + ' 共' + thumbUrls.length;
        var nextBtn = document.createElement('button'); nextBtn.className = 'page-btn'; nextBtn.textContent = '下一页 ›'; nextBtn.disabled = thumbPage >= thumbTotalPages-1;
        nextBtn.onclick = function(){ thumbPage++; renderThumbPage(); };
        bar.appendChild(prevBtn); bar.appendChild(info); bar.appendChild(nextBtn);
        thumbWrap.appendChild(bar);
      }
      renderThumbPage();
      div.appendChild(thumbWrap);
      batchContainer.appendChild(div);
    }

    function updateMoreBtn() {
      var oldBar = document.getElementById('batch-more-bar');
      if (oldBar) oldBar.remove();

      if (batchIndex < batches.length) {
        var bar = document.createElement('div'); bar.id = 'batch-more-bar';
        bar.style.cssText = 'text-align:center; margin:10px 0';
        var btn = document.createElement('button'); btn.className = 'page-btn';
        btn.textContent = '显示更多（剩余 ' + (batches.length - batchIndex) + ' 个批次）';
        btn.onclick = function(){
          loadMore();
        };
        bar.appendChild(btn);
        batchContainer.appendChild(bar);
      }
    }

    function loadMore() {
      var end = Math.min(batchIndex + batchPageSize, batches.length);
      for (var i = batchIndex; i < end; i++) renderBatch(batches[i]);
      batchIndex = end;
      updateMoreBtn();
    }

    loadMore();
  })();

  // 实盘交易收益分析（已有文件展示，不上传）
  (function(){
    var list = document.getElementById('live-list');
    var items = data.live_report || [];
    if (items.length === 0) {
      list.innerHTML = '<p style="color:#999">暂无实盘报告</p>';
      return;
    }
    var container = document.createElement('div');
    paginate(container, items, 10, function(name){
      var d = document.createElement('div'); d.className = 'file-item';
      d.innerHTML = '<a href="/LIVE/live_report/' + encodeURIComponent(name) + '">📊 ' + name + '</a>';
      return d;
    });
    list.innerHTML = ''; list.appendChild(container);
  })();
}).catch(function(){
  // 加载失败，保持空白
});
</script>
</body>
</html>
